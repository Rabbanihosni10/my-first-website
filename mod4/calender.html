<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Daily Calender!</title>
        <link rel="shortcut icon" href="./assets/—Pngtree—freelancer software developer programmer coder_16198325.png" type="image/x-icon">
        <style>
            .container{
                /* border: 1px solid black; */
                display: grid;
                grid-template-columns: repeat(7,1fr);
                grid-template-rows:repeat(6,1fr);
                /* text-align: center; */
                gap: 10px;
            }
            .day, .day-name{
                border: 1px solid black;
                border-radius: 10px;
                background-color: aliceblue;
                font-size: 1.5rem;
                height: 50px;
                width: 80px;
                display: flex;
                justify-content: center ;
                align-items: center;
            }
            .day:hover{
                cursor: pointer;
                background-color: bisque;
            }
            .day-name:hover{
                cursor: pointer;
                background-color: bisque;
            }
            .month{
                text-align: center;
                font-weight: 400;
                font-size: larger;
            }
            .day-name{
                font-size: 1rem;
                height: 30px;
                background-color: #a7c1ee;
            }
        </style>
    </head>
    <body>
        <div class="month">

        </div>
