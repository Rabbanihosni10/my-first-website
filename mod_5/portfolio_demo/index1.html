<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gpt-portfolio</title>
    <link rel="stylesheet" href="./style1.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">YourLogo.</a>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>

            <a href="#contact" class="hire-btn">Hire Me</a>
        </div>
    </nav>
    <footer class="site-footer container" id="contact">
  <section class="footer-left">
    <p class="footer-eyebrow">Get in touch</p>
    <h2>Let’s Connect</h2>
    <p class="footer-description">
      Please fill out the form to contact me, or call between 9:00 AM and
      8:00 PM ET, Monday through Friday.
    </p>

    <div class="social-links">
      <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
      <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
      <a href="#" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
    </div>
  </section>

  <section class="footer-right">
    <p class="footer-eyebrow">Contact form</p>
    <h2>Let’s Message Me</h2>

    <form>
      <input type="text" placeholder="Your name" aria-label="Your name" required>
      <input type="email" placeholder="Your email" aria-label="Your email" required>
      <textarea rows="5" placeholder="Write your message..." aria-label="Message" required></textarea>
      <button type="submit" class="common-btn">Send Message</button>
    </form>
  </section>
</footer>
</body>
</html>
